name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for pub.dev trusted publishing (OIDC)
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify tag matches pubspec version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          if [[ "v${VERSION}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pubspec version v${VERSION}"
            exit 1
          fi

      - name: Dry run
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        if: github.ref_type == 'tag'
        run: dart pub publish -f
