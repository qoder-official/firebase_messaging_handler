name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify tag matches pubspec version
        shell: bash
        run: |
          VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          if [[ "${GITHUB_REF_NAME}" == v* && "v${VERSION}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pubspec version v${VERSION}"
            exit 1
          fi

      - name: Dry run publish
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        if: ${{ github.ref_type == 'tag' }}
        env:
          PUB_TOKEN: ${{ secrets.PUB_DEV_PUBLISH_ACCESS_TOKEN }}
        shell: bash
        run: |
          if [[ -z "${PUB_TOKEN}" ]]; then
            echo "PUB_DEV_PUBLISH_ACCESS_TOKEN secret is not configured"
            exit 1
          fi
          mkdir -p "$HOME/.config/dart"
          cat > "$HOME/.config/dart/pub-credentials.json" <<EOF
          {
            "accessToken":"${PUB_TOKEN}",
            "refreshToken":"${PUB_TOKEN}",
            "tokenEndpoint":"https://accounts.google.com/o/oauth2/token",
            "scopes":["openid","https://www.googleapis.com/auth/userinfo.email"]
          }
          EOF
          dart pub publish -f
