name: Feature request
description: Propose a new capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Explain the use case and why current APIs are insufficient.
      placeholder: I need to cancel a locally displayed notification from a silent FCM payload.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Sketch the desired API shape, payload schema, or UX.
      placeholder: |
        Add a background action schema like:
        { "fcmh_action": "cancel", "id": "..." }
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note workarounds or existing packages/features you evaluated.
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
