name: firebase_messaging_handler_example
description: A comprehensive showcase application demonstrating all features of the Firebase Messaging Handler plugin.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Material Design icons
  cupertino_icons: ^1.0.8

  # Firebase Core (required for Firebase services)
  firebase_core: ^3.10.0
  
  # Firebase Cloud Messaging
  firebase_messaging: ^15.1.4

  # Firebase Messaging Handler Plugin (local development)
  firebase_messaging_handler:
    path: ../

  # State management
  provider: ^6.1.4
  
  # URL launching for external links
  url_launcher: ^6.3.1
  
  # Clipboard operations
  clipboard: ^0.1.3
  
  # Persistent storage for timeline caching
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
