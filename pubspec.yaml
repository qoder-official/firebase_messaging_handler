name: firebase_messaging_handler
description: A comprehensive Flutter plugin for handling Firebase Cloud Messaging notifications with advanced features.
version: 1.0.0
homepage: https://github.com/neel-sharma/firebase_messaging_handler
repository: https://github.com/neel-sharma/firebase_messaging_handler
issue_tracker: https://github.com/neel-sharma/firebase_messaging_handler/issues
documentation: https://github.com/neel-sharma/firebase_messaging_handler#readme

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase Cloud Messaging
  firebase_messaging: ">=16.0.0"
  
  # Local notifications for scheduling and custom handling
  flutter_local_notifications: ">=17.0.0"

  # Persistent storage for configuration and caching
  shared_preferences: ">=2.0.0"

  # Web platform support
  universal_html: ">=2.0.0"
  flutter_web_plugins:
    sdk: flutter

  # Timezone handling for scheduled notifications
  timezone: ">=0.9.0"

  # HTML widget support for rich content
  flutter_widget_from_html_core: ">=0.15.0"

  # Badge management for Android & iOS (using flutter_local_notifications)
  # flutter_app_badger: ">=1.5.0"  # Removed due to namespace issues

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Platform-specific configuration
flutter:
  plugin:
    platforms:
      ios:
        pluginClass: FirebaseMessagingHandlerPlugin
      web:
        pluginClass: FirebaseMessagingHandlerWeb
        fileName: firebase_messaging_handler_web.dart
